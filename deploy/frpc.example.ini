# frp 客户端示例 — 复制为 deploy/frpc.ini 并填写你的 frps 信息
# cp deploy/frpc.example.ini deploy/frpc.ini

[common]
server_addr = your-frps.example.com
server_port = 7000
# token = your-token

[zhiguo]
type = http
local_ip = 127.0.0.1
local_port = 3300
custom_domains = zhiguo.example.com

# 若 frps 配置了 HTTPS 插件，公网访问即为 https://zhiguo.example.com
# 将同一域名写入 .env 的 ZHIGUO_PUBLIC_URL
